<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#000000" />
<title>J.A.R.V.I.S. — Assistant Core</title>
<style>
  /* ============================================================
     JARVIS UI THEME
     Background : Pure Pitch Black (#000000)
     Accent     : Arc-Reactor Neon Cyan (#00f3ff)
     ============================================================ */
  :root {
    --jarvis-cyan: #00f3ff;
    --jarvis-cyan-dim: rgba(0, 243, 255, 0.35);
    --jarvis-cyan-faint: rgba(0, 243, 255, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    height: 100%;
    background: #000000;              /* Rule: pitch black everywhere */
    overflow: hidden;
    font-family: "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--jarvis-cyan);
    user-select: none;
    touch-action: manipulation;
  }

  /* ---------- Main render surface ---------- */
  #reactorCanvas {
    position: fixed;
    inset: 0;
    display: block;
    background: #000000;
  }

  /* ---------- HUD status readout ---------- */
  #hud {
    position: fixed;
    top: max(16px, env(safe-area-inset-top));
    left: 0;
    right: 0;
    text-align: center;
    pointer-events: none;
    z-index: 5;
  }
  #stateLabel {
    display: inline-block;
    font-size: 12px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--jarvis-cyan);
    text-shadow: 0 0 8px var(--jarvis-cyan), 0 0 22px var(--jarvis-cyan-dim);
    border: 1px solid var(--jarvis-cyan-dim);
    border-radius: 999px;
    padding: 6px 18px 6px 24px; /* extra left pad balances letter-spacing */
    background: var(--jarvis-cyan-faint);
    animation: hudBreath 3s ease-in-out infinite;
  }
  @keyframes hudBreath {
    0%, 100% { opacity: 0.75; }
    50%      { opacity: 1; }
  }

  /* ---------- One-time permission modal ---------- */
  #permissionModal {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.92);
    backdrop-filter: blur(4px);
    opacity: 1;
    transition: opacity 0.4s ease;
  }
  #permissionModal.hidden { opacity: 0; pointer-events: none; }

  .modal-card {
    width: min(86vw, 360px);
    padding: 28px 24px;
    text-align: center;
    background: #000000;
    border: 1px solid var(--jarvis-cyan-dim);
    border-radius: 16px;
    box-shadow: 0 0 24px rgba(0, 243, 255, 0.25),
                inset 0 0 40px rgba(0, 243, 255, 0.05);
  }
  .modal-card h2 {
    font-size: 16px;
    letter-spacing: 4px;
    margin-bottom: 12px;
    text-shadow: 0 0 10px var(--jarvis-cyan);
  }
  .modal-card p {
    font-size: 13px;
    line-height: 1.6;
    color: rgba(0, 243, 255, 0.75);
    margin-bottom: 22px;
  }
  .modal-card button {
    width: 100%;
    padding: 13px 0;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #000000;
    background: var(--jarvis-cyan);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 18px var(--jarvis-cyan-dim);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .modal-card button:active {
    transform: scale(0.97);
    box-shadow: 0 0 30px var(--jarvis-cyan);
  }

  /* ---------- AdMob banner slot (modular placeholder) ----------
     The native Android WebView layer can inject a banner here, or
     you can mount the AdMob web SDK inside this container.
     Kept display:none until AdModule.init() is called. */
  #adSlot {
    position: fixed;
    bottom: env(safe-area-inset-bottom, 0);
    left: 0;
    right: 0;
    height: 50px;              /* standard 320x50 banner height */
    display: none;
    align-items: center;
    justify-content: center;
    background: #000000;
    z-index: 10;
  }
</style>
</head>
<body>

  <!-- Render surface: all reactor / particle / wave visuals -->
  <canvas id="reactorCanvas"></canvas>

  <!-- HUD state readout -->
  <div id="hud"><span id="stateLabel">INITIALIZING</span></div>

  <!-- One-time microphone permission modal -->
  <div id="permissionModal" class="hidden" role="dialog" aria-modal="true">
    <div class="modal-card">
      <h2>SYSTEM ACCESS</h2>
      <p>J.A.R.V.I.S. requires microphone access to analyse voice input in real time. Audio is processed locally on this device and never stored or transmitted.</p>
      <button id="grantMicBtn">Enable Microphone</button>
    </div>
  </div>

  <!-- Modular AdMob banner mount point -->
  <div id="adSlot" aria-hidden="true"></div>

<script>
"use strict";

/* ================================================================
 *  J.A.R.V.I.S. CORE — single-file frontend
 *  Modules:
 *    CONFIG          — all tunables in one place
 *    Stage           — canvas sizing / DPR handling
 *    SpriteFactory   — pre-rendered glow sprites (cheap mobile glow)
 *    ParticleSystem  — fixed-size object pool (zero GC churn)
 *    AudioEngine     — Web Audio API mic volume analyser
 *    Renderer        — idle reactor / listening ring / talking wave
 *    StateMachine    — idle | listening | talking transitions
 *    PermissionFlow  — one-time modal + localStorage flag
 *    AdModule        — future AdMob banner integration hook
 * ================================================================ */

/* ----------------------------- CONFIG ----------------------------- */
const CONFIG = Object.freeze({
  COLOR: "#00f3ff",                    // the ONLY accent color allowed
  RGB: { r: 0, g: 243, b: 255 },
  MAX_DPR: 2,                          // cap devicePixelRatio → 60fps on mobile
  PARTICLE_COUNT: 140,                 // fixed pool, allocated once
  FFT_SIZE: 512,                       // analyser resolution
  VOLUME_SMOOTHING: 0.82,              // exponential smoothing factor
  TALK_THRESHOLD: 0.06,                // volume above this → "talking"
  TALK_RELEASE_MS: 450,                // silence duration before leaving talking
  STORAGE_KEY: "jarvis_mic_granted"    // one-time permission flag
});

/* ------------------------------ Stage ----------------------------- */
/* Owns the canvas, its 2D context, and resize/DPR logic. */
const Stage = (() => {
  const canvas = document.getElementById("reactorCanvas");
  const ctx = canvas.getContext("2d", { alpha: false }); // opaque = faster
  let w = 0, h = 0, cx = 0, cy = 0, dpr = 1;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, CONFIG.MAX_DPR);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width  = Math.round(w * dpr);
    canvas.height = Math.round(h * dpr);
    canvas.style.width  = w + "px";
    canvas.style.height = h + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0); // draw in CSS pixels
    cx = w / 2;
    cy = h / 2;
  }

  window.addEventListener("resize", resize, { passive: true });
  window.addEventListener("orientationchange", resize, { passive: true });
  resize();

  return {
    ctx,
    get w() { return w; }, get h() { return h; },
    get cx() { return cx; }, get cy() { return cy; },
    /* Base radius scales with the smaller screen dimension */
    get baseR() { return Math.min(w, h) * 0.16; }
  };
})();

/* -------------------------- SpriteFactory -------------------------- */
/* shadowBlur is extremely slow on mobile GPUs. Instead we pre-render
 * a radial-gradient "glow dot" once and stamp it with drawImage —
 * this is the key to a stable 60 FPS particle field. */
const SpriteFactory = (() => {
  function makeGlowDot(size) {
    const c = document.createElement("canvas");
    c.width = c.height = size;
    const g = c.getContext("2d");
    const half = size / 2;
    const grad = g.createRadialGradient(half, half, 0, half, half, half);
    const { r, g: gg, b } = CONFIG.RGB;
    grad.addColorStop(0.0, `rgba(${r},${gg},${b},1)`);
    grad.addColorStop(0.25, `rgba(${r},${gg},${b},0.6)`);
    grad.addColorStop(1.0, `rgba(${r},${gg},${b},0)`);
    g.fillStyle = grad;
    g.fillRect(0, 0, size, size);
    return c;
  }
  return { glowDot: makeGlowDot(64) };
})();

/* -------------------------- ParticleSystem ------------------------- */
/* Fixed-size pool. Particles are never created/destroyed after init,
 * only recycled in place → zero garbage collection pressure. */
const ParticleSystem = (() => {
  const pool = new Array(CONFIG.PARTICLE_COUNT);

  function respawn(p) {
    p.angle  = Math.random() * Math.PI * 2;
    p.radius = Stage.baseR * (0.4 + Math.random() * 0.4);
    p.speed  = 0.2 + Math.random() * 0.6;    // outward px/frame @60fps
    p.spin   = (Math.random() - 0.5) * 0.02; // angular drift
    p.size   = 2 + Math.random() * 5;        // sprite draw size
    p.life   = 0;
    p.maxLife = 60 + Math.random() * 120;    // frames
  }

  for (let i = 0; i < pool.length; i++) {
    pool[i] = {};
    respawn(pool[i]);
    pool[i].life = Math.random() * pool[i].maxLife; // desync spawn wave
  }

  /* energy: 0..1 mic volume — drives outward velocity & brightness */
  function updateAndDraw(ctx, dt, energy) {
    const sprite = SpriteFactory.glowDot;
    const boost = 1 + energy * 9; // particles erupt when user speaks

    for (let i = 0; i < pool.length; i++) {
      const p = pool[i];
      p.life += dt;
      p.radius += p.speed * boost * dt;
      p.angle  += p.spin * dt;

      if (p.life >= p.maxLife || p.radius > Stage.baseR * 3.2) {
        respawn(p);
        continue;
      }

      /* fade in → fade out over lifetime */
      const t = p.life / p.maxLife;
      const alpha = (t < 0.2 ? t / 0.2 : 1 - (t - 0.2) / 0.8) * (0.35 + energy * 0.65);

      const x = Stage.cx + Math.cos(p.angle) * p.radius;
      const y = Stage.cy + Math.sin(p.angle) * p.radius;
      const s = p.size * (1 + energy * 1.5);

      ctx.globalAlpha = alpha;
      ctx.drawImage(sprite, x - s, y - s, s * 2, s * 2);
    }
    ctx.globalAlpha = 1;
  }

  return { updateAndDraw };
})();

/* ---------------------------- AudioEngine --------------------------- */
/* Wraps getUserMedia + AnalyserNode. Exposes a smoothed 0..1 volume. */
const AudioEngine = (() => {
  let audioCtx = null;
  let analyser = null;
  let source = null;
  let stream = null;
  let freqData = null;      // reused buffer — allocated once
  let smoothedVolume = 0;
  let running = false;

  async function start() {
    if (running) return true;
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        audio: { echoCancellation: true, noiseSuppression: true },
        video: false
      });
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = CONFIG.FFT_SIZE;
      analyser.smoothingTimeConstant = 0.6;
      freqData = new Uint8Array(analyser.frequencyBinCount);
      source = audioCtx.createMediaStreamSource(stream);
      source.connect(analyser); // analyser only — nothing routed to speakers
      running = true;
      return true;
    } catch (err) {
      console.warn("[AudioEngine] mic unavailable:", err.name);
      return false;
    }
  }

  /* Average the voice-frequency band → normalized RMS-style volume */
  function readVolume() {
    if (!running) return 0;
    analyser.getByteFrequencyData(freqData);
    let sum = 0;
    const bins = Math.floor(freqData.length * 0.5); // focus on lower/voice band
    for (let i = 0; i < bins; i++) sum += freqData[i];
    const raw = sum / (bins * 255); // 0..1
    /* exponential smoothing avoids jittery visuals */
    smoothedVolume = smoothedVolume * CONFIG.VOLUME_SMOOTHING +
                     raw * (1 - CONFIG.VOLUME_SMOOTHING);
    return smoothedVolume;
  }

  /* Full teardown — releases mic + audio graph (zero leak on exit) */
  function destroy() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    if (source) source.disconnect();
    if (audioCtx && audioCtx.state !== "closed") audioCtx.close();
    stream = source = analyser = audioCtx = freqData = null;
    running = false;
    smoothedVolume = 0;
  }

  /* Mobile browsers suspend AudioContext when backgrounded */
  function resume() {
    if (audioCtx && audioCtx.state === "suspended") audioCtx.resume();
  }

  return { start, readVolume, destroy, resume, get isRunning() { return running; } };
})();

/* ----------------------------- Renderer ----------------------------- */
/* All drawing routines. Uses additive compositing for the neon look. */
const Renderer = (() => {
  const ctx = Stage.ctx;
  const TWO_PI = Math.PI * 2;

  /* --- helper: stroke a circle --- */
  function ring(x, y, r, width, alpha) {
    ctx.globalAlpha = alpha;
    ctx.lineWidth = width;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, TWO_PI);
    ctx.stroke();
  }

  /* --- Arc-Reactor core: rotating segmented rings + pulsing heart --- */
  function drawReactor(time, energy) {
    const { cx, cy, baseR } = Stage;
    const pulse = 1 + Math.sin(time * 0.002) * 0.04 + energy * 0.35;
    const R = baseR * pulse;

    ctx.strokeStyle = CONFIG.COLOR;
    ctx.fillStyle = CONFIG.COLOR;
    ctx.lineCap = "round";

    /* soft halo behind everything (single gradient — cheap) */
    const halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, R * 2.4);
    halo.addColorStop(0, `rgba(0,243,255,${0.16 + energy * 0.25})`);
    halo.addColorStop(1, "rgba(0,243,255,0)");
    ctx.globalAlpha = 1;
    ctx.fillStyle = halo;
    ctx.fillRect(cx - R * 2.4, cy - R * 2.4, R * 4.8, R * 4.8);
    ctx.fillStyle = CONFIG.COLOR;

    /* inner core dot */
    const coreR = R * 0.22 * (1 + energy * 0.6);
    const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR * 2);
    coreGrad.addColorStop(0, "rgba(220,255,255,0.95)");
    coreGrad.addColorStop(0.35, "rgba(0,243,255,0.9)");
    coreGrad.addColorStop(1, "rgba(0,243,255,0)");
    ctx.fillStyle = coreGrad;
    ctx.beginPath();
    ctx.arc(cx, cy, coreR * 2, 0, TWO_PI);
    ctx.fill();
    ctx.fillStyle = CONFIG.COLOR;

    /* thin steady rings */
    ring(cx, cy, R * 0.55, 1.5, 0.9);
    ring(cx, cy, R * 1.0, 2, 0.7);
    ring(cx, cy, R * 1.28, 1, 0.3);

    /* --- rotating segments, layer 1 (reactor "coils") --- */
    const segs = 10;
    const rot1 = time * 0.0006;
    ctx.globalAlpha = 0.95;
    ctx.lineWidth = R * 0.10;
    for (let i = 0; i < segs; i++) {
      const a0 = rot1 + (i / segs) * TWO_PI;
      ctx.beginPath();
      ctx.arc(cx, cy, R * 0.78, a0, a0 + (TWO_PI / segs) * 0.55);
      ctx.stroke();
    }

    /* --- rotating segments, layer 2 (counter-rotation) --- */
    const rot2 = -time * 0.0004;
    ctx.globalAlpha = 0.45;
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      const a0 = rot2 + (i / 3) * TWO_PI;
      ctx.beginPath();
      ctx.arc(cx, cy, R * 1.14, a0, a0 + 1.4);
      ctx.stroke();
    }

    /* --- flower-of-life petals inside the core (idle detail) --- */
    ctx.globalAlpha = 0.5;
    ctx.lineWidth = 1;
    const petalR = R * 0.28;
    const rot3 = time * 0.0003;
    for (let i = 0; i < 6; i++) {
      const a = rot3 + (i / 6) * TWO_PI;
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a) * petalR, cy + Math.sin(a) * petalR,
              petalR, 0, TWO_PI);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  /* --- Listening: expanding sonar ripples --- */
  function drawListeningRipples(time) {
    const { cx, cy, baseR } = Stage;
    ctx.strokeStyle = CONFIG.COLOR;
    for (let i = 0; i < 3; i++) {
      /* each ripple loops over 2.4s, phase-shifted */
      const t = ((time * 0.000416) + i / 3) % 1;
      ring(cx, cy, baseR * (1.3 + t * 1.6), 1.5, (1 - t) * 0.5);
    }
    ctx.globalAlpha = 1;
  }

  /* --- Talking: Iron-Man face contour (symmetric helmet lines)
         whose spread & glow pulse directly with mic volume --- */
  function drawFaceContour(time, energy) {
    const { cx, cy, baseR } = Stage;
    const spread = 1 + energy * 0.9;          // volume pushes lines outward
    const R = baseR * 1.5 * spread;
    ctx.strokeStyle = CONFIG.COLOR;
    ctx.lineCap = "round";

    /* helmet silhouette: mirrored arc pairs (jaw, cheek, brow) */
    const arcs = [
      /* [radiusScale, startAngle, endAngle, width] — right side; mirrored for left */
      [1.00, -0.55, 0.55, 2.5],   // cheek / jaw line
      [0.80, -1.05, -0.60, 2.0],  // brow line
      [0.80,  0.60,  1.05, 2.0],  // chin line
      [1.18, -0.35, 0.35, 1.2]    // outer trace
    ];
    for (const [rs, a0, a1, wLine] of arcs) {
      ctx.lineWidth = wLine + energy * 3;
      ctx.globalAlpha = 0.35 + energy * 0.65;
      /* right side */
      ctx.beginPath();
      ctx.arc(cx, cy, R * rs, a0, a1);
      ctx.stroke();
      /* mirrored left side */
      ctx.beginPath();
      ctx.arc(cx, cy, R * rs, Math.PI - a1, Math.PI - a0);
      ctx.stroke();
    }

    /* eye slits — two short glowing horizontal bars */
    const eyeY = cy - R * 0.28;
    const eyeW = R * 0.30 * (1 + energy * 0.4);
    ctx.lineWidth = 4 + energy * 6;
    ctx.globalAlpha = 0.8 + energy * 0.2;
    for (const side of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(cx + side * R * 0.20, eyeY);
      ctx.lineTo(cx + side * (R * 0.20 + eyeW), eyeY - R * 0.04);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  /* --- Talking: horizontal particle waveform under the reactor --- */
  function drawVoiceWave(time, energy) {
    const { cx, cy, w, baseR } = Stage;
    const waveY = cy + baseR * 2.2;
    const span = Math.min(w * 0.8, baseR * 5);
    const points = 48;
    ctx.strokeStyle = CONFIG.COLOR;
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.4 + energy * 0.6;
    ctx.beginPath();
    for (let i = 0; i <= points; i++) {
      const t = i / points;
      const x = cx - span / 2 + t * span;
      /* window function keeps wave anchored at both ends */
      const env = Math.sin(t * Math.PI);
      const y = waveY +
        Math.sin(t * 14 + time * 0.02) * energy * baseR * 0.9 * env +
        Math.sin(t * 31 - time * 0.013) * energy * baseR * 0.35 * env;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  return { drawReactor, drawListeningRipples, drawFaceContour, drawVoiceWave };
})();

/* --------------------------- StateMachine --------------------------- */
const StateMachine = (() => {
  const STATES = { IDLE: "idle", LISTENING: "listening", TALKING: "talking" };
  let current = STATES.IDLE;
  let lastLoudAt = 0;
  const label = document.getElementById("stateLabel");

  const LABELS = {
    idle:      "STANDBY",
    listening: "LISTENING",
    talking:   "PROCESSING VOICE"
  };

  /* Public, explicit state setter — call from anywhere (e.g. backend). */
  function setState(next) {
    if (next === current || !Object.values(STATES).includes(next)) return;
    current = next;
    label.textContent = LABELS[next];
  }

  /* Auto transitions driven by mic volume each frame. */
  function update(volume, now) {
    if (!AudioEngine.isRunning) { setState(STATES.IDLE); return; }
    if (volume > CONFIG.TALK_THRESHOLD) {
      lastLoudAt = now;
      setState(STATES.TALKING);
    } else if (current === STATES.TALKING &&
               now - lastLoudAt > CONFIG.TALK_RELEASE_MS) {
      setState(STATES.LISTENING);   // debounce: brief pauses stay "talking"
    } else if (current === STATES.IDLE) {
      setState(STATES.LISTENING);
    }
  }

  return { STATES, setState, update, get current() { return current; } };
})();

/* --------------------------- PermissionFlow ------------------------- */
/* One-time modal. localStorage flag skips the modal on future launches
 * (the OS-level permission is remembered by Android/WebView itself). */
const PermissionFlow = (() => {
  const modal = document.getElementById("permissionModal");
  const btn = document.getElementById("grantMicBtn");

  async function requestMic() {
    const ok = await AudioEngine.start();
    if (ok) {
      localStorage.setItem(CONFIG.STORAGE_KEY, "1");
      modal.classList.add("hidden");
      StateMachine.setState(StateMachine.STATES.LISTENING);
    } else {
      /* denied — stay idle; user can retry from the modal */
      modal.classList.remove("hidden");
    }
  }

  function init() {
    btn.addEventListener("click", requestMic);
    if (localStorage.getItem(CONFIG.STORAGE_KEY) === "1") {
      /* Flag present → attempt silent start. A user gesture may still be
       * required for AudioContext on some devices; tapping anywhere works. */
      modal.classList.add("hidden");
      requestMic();
      document.body.addEventListener("click", () => AudioEngine.resume(),
        { passive: true });
    } else {
      modal.classList.remove("hidden");
    }
  }

  return { init };
})();

/* ------------------------------ AdModule ---------------------------- */
/* Modular hook for future AdMob banner integration.
 * From native Android:  webView.evaluateJavascript("AdModule.init()") 
 * or mount the AdMob web SDK / house banner into #adSlot. */
const AdModule = (() => {
  const slot = document.getElementById("adSlot");
  function init(html) {
    if (typeof html === "string") slot.innerHTML = html; // sanitized upstream
    slot.style.display = "flex";
  }
  function hide() { slot.style.display = "none"; }
  return { init, hide };
})();
window.AdModule = AdModule; // expose for the native layer

/* ---------------------------- Main Loop ----------------------------- */
/* Single rAF loop, delta-time normalized to 60fps units, paused when
 * the tab/app is hidden (saves battery + prevents timer drift). */
(function main() {
  const ctx = Stage.ctx;
  let rafId = 0;
  let lastTs = performance.now();

  function frame(ts) {
    rafId = requestAnimationFrame(frame);

    /* dt in "60fps frames" (1.0 = one ideal frame), clamped vs. hitches */
    const dt = Math.min((ts - lastTs) / 16.666, 3);
    lastTs = ts;

    const volume = AudioEngine.readVolume();
    StateMachine.update(volume, ts);

    /* full clear — opaque context, pitch black */
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "#000000";
    ctx.fillRect(0, 0, Stage.w, Stage.h);

    /* additive blending = authentic neon light accumulation */
    ctx.globalCompositeOperation = "lighter";

    const state = StateMachine.current;
    const energy = state === "talking" ? Math.min(volume * 4, 1) : 0;

    Renderer.drawReactor(ts, energy);                 // always-on core
    ParticleSystem.updateAndDraw(ctx, dt, energy);    // ambient + eruption

    if (state === "listening") {
      Renderer.drawListeningRipples(ts);
    } else if (state === "talking") {
      Renderer.drawFaceContour(ts, energy);
      Renderer.drawVoiceWave(ts, energy);
    }

    ctx.globalCompositeOperation = "source-over";
  }

  function startLoop() {
    if (!rafId) {
      lastTs = performance.now();
      rafId = requestAnimationFrame(frame);
    }
  }
  function stopLoop() {
    if (rafId) { cancelAnimationFrame(rafId); rafId = 0; }
  }

  /* Pause rendering + resume audio correctly on app switch */
  document.addEventListener("visibilitychange", () => {
    if (document.hidden) stopLoop();
    else { AudioEngine.resume(); startLoop(); }
  });

  /* Release mic + audio graph when the WebView is torn down */
  window.addEventListener("pagehide", () => {
    stopLoop();
    AudioEngine.destroy();
  });

  PermissionFlow.init();
  StateMachine.setState(StateMachine.STATES.IDLE);
  startLoop();
})();
</script>
</body>
</html>
